# Configuration made by Chick

# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info

print_info() {
    prin "    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n Hardware Information \nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ"
    info "${c1} вҖӢ вҖӢ у°Ңў " model
    info "${cl1} вҖӢ вҖӢ у°Қӣ " cpu
    info "${c3} вҖӢ вҖӢ у°ҳҡ " gpu
    info "${c4} вҖӢ   " disk
    info "${c12}вҖӢ вҖӢ вҖӢ вҖӢоҝ… " memory
    info "${cl6}вҖӢ вҖӢ вҖӢ вҖӢу°Қ№ " resolution
    prin "    в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n Software Information \nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө"
#    info " вҖӢ вҖӢ пҖҮ " users
    info "${c1} вҖӢ вҖӢ пҢғ " distro
    info "${c2} вҖӢ вҖӢ оҜҶ " kernel
    info "${c3} вҖӢ вҖӢ оҲј " de
    info "${c4} вҖӢ вҖӢ п’Ҳ " wm
    info "${c7}вҖӢ вҖӢ вҖӢ п’Ҝ " shell
    info "${c1}вҖӢ вҖӢ вҖӢ п’ү " term
    info "${cl2} вҖӢ вҖӢ пҖұ " term_font
#    info " вҖӢ вҖӢ в”Ӯ пҖұ " font
    info "${c1} вҖӢ вҖӢ  пқ» " theme
    info "${c2} вҖӢ вҖӢ  у°Җ» " icons
    info "${c3} вҖӢ вҖӢ у°Ҡ  " packages
    info "${c4} вҖӢ вҖӢ пҒў " uptime
#   info " вҖӢ вҖӢ  пӮ… " gpu_driver  # Linux/macOS only
#    info " вҖӢ вҖӢ пӮ… " cpu_usage
#    info " вҖӢ вҖӢ пұҳ " song
    # [[ "$player" ]] && prin "Music Player" "$player"
    info "${cl5} вҖӢ вҖӢ пҮ« " local_ip
#    info " вҖӢ вҖӢ  пҮ« " public_ip
#    info " вҖӢ вҖӢ  п‘җ " locale  # This only works on glibc systems.
    prin "    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
    info cols
prin "\n \n \n \n \n ${cl3}п„‘ \n \n ${cl5}п„‘ \n \n ${cl2}п„‘ \n \n ${cl6}п„‘  \n \n ${cl4}п„‘  \n \n ${cl1}п„‘  \n \n ${cl7}п„‘  \n \n ${cl0}п„‘"
}

kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
memory_percent="on"
package_managers="on"
shell_path="off"
shell_version="on"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"
gpu_brand="on"
gpu_type="all"
refresh_rate="on"
gtk_shorthand="on"
gtk2="on"
gtk3="on"
#public_ip_host="http://ident.me"
#public_ip_timeout=2
disk_show=('/')
music_player="vlc"
song_format="%artist% - %title%"
song_shorthand="off"
colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
separator=" п…ё "
color_blocks="off"
block_range=(0 15) # Colorblocks

# Colors for custom colorblocks
magenta="\033[0;35m"
green="\033[0;32m"
white="\033[0;37m"
blue="\033[0;34m"
red="\033[0;31m"
black="\033[0;40;30m"
yellow="\033[0;33m"
cyan="\033[0;36m"
reset="\033[0m"
bgyellow="\033[0;43;33m"
bgwhite="\033[0;47;37m"
cl0="${reset}"
cl1="${magenta}"
cl2="${green}"
cl3="${white}"
cl4="${blue}"
cl5="${red}"
cl6="${yellow}"
cl7="${cyan}"
cl8="${black}"
cl9="${bgyellow}"
cl10="${bgwhite}"

block_width=4
block_height=1

bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

cpu_display="on"
memory_display="on"
battery_display="on"
disk_display="off"

image_backend="w3m"
#image_source="$HOME/"
image_size="small"
image_loop="off"

aascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"

gap=2

yoffset=0
xoffset=0

stdout="off"
