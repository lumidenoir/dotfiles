include-file = colors.ini

[system]
adapter = ACAD
battery = BAT0
network_interface = wlan0

; [color]
; background = #1f1d29
; foreground = #eaeaea
; red = #eb6f92
; cyan = #9ccfd8
; yellow = #f6c177
; blue = #31748f
; magenta-alt = #c4a7e7
; gray = #928374
