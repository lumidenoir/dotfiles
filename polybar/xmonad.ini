animation-charging-2 = " ’ēé "
animation-charging-3 = " ’ēü "
animation-charging-4 = " ’ēĆ "
animation-charging-font = 2
animation-charging-foreground = ${color.background}
animation-charging-background = ${color.red}
animation-charging-framerate = 750

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = false
inline-mode = false

enable-click = true
enable-scroll = true
reverse-scroll = true

fuzzy-match = true

icon-0 = 1;õĖĆ
icon-1 = 2;õ║ī
icon-2 = 3;õĖē
icon-3 = 4;Õøø
icon-4 = 5;õ║ö
icon-5 = 6;ÕģŁ
icon-6 = 7;õĖā
icon-7 = 8;Õģ½
icon-default = "Ō¼ó"

format = <label-state>

label-monitor = %name%

label-active = %icon%
label-active-font=4
label-active-background = ${color.background-alt}
label-active-foreground = ${color.cyan}
label-active-underline = ${color.cyan}

label-occupied = %icon%
label-occupied-font=4
label-occupied-foreground = ${color.blue}
label-occupied-background = ${color.background-alt}

label-urgent = %icon%
label-urgent-font=4
label-urgent-foreground = ${color.red}
label-urgent-background = ${color.background-alt}
label-urgent-underline = ${color.red}

label-empty = %icon%
label-empty-background = ${color.background-alt}
label-empty-font=4

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "’ŗø "
format-prefix-font= 2
format-padding = 0
format-prefix-foreground = ${color.background}
format-foreground = ${color.background}
format-background = ${color.cyan}
label = " %percentage%% "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/time]
type = internal/date
interval = 1
format-margin = 0
time = "%I:%M %p"
time-alt = "%A, %d/%m/%y"

format-prefix = "’ĆŚ "
format-prefix-foreground = ${color.background}
format-prefix-background = ${color.blue}

label = %time%
label-foreground = ${color.background}
label-background = ${color.blue}
label-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/filesystem]
type = internal/fs

mount-0 = /
interval = 30
fixed-values = true

format-mounted = <label-mounted>
format-mounted-prefix = "’éĀ "
format-mounted-prefix-foreground = ${color.background}
format-mounted-prefix-background = ${color.cyan}

format-unmounted = <label-unmounted>
format-unmounted-prefix = " ’éĀ "
format-unmounted-prefix-foreground = ${color.background}
format-unmounted-prefix-background = ${color.cyan}

label-mounted = " %used%"
label-unmounted = " NA"
label-mounted-foreground = ${color.background}

label-mounted-background = ${color.cyan}
label-unmounted-background = ${color.cyan}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/memory]
type = internal/memory

interval = 3

format = <label>
format-prefix = "Ņ┐ģ "
format-prefix-foreground = ${color.background}
format-foreground = ${color.background}
format-background = ${color.red}

label = " %percentage_used%% "

